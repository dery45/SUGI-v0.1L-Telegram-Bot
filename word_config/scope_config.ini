[greetings]
# Questions/phrases that always pass through to Sugi's persona.
# Sugi's Modelfile handles these natively (salam pembuka, identitas, dll.)
patterns =
    halo
    hai
    hello
    hi
    hey
    selamat pagi
    selamat siang
    selamat sore
    selamat malam
    assalamu
    permisi
    salam
    siapa kamu
    kamu siapa
    who are you
    nama kamu
    apa itu sugi
    sugi itu apa
    kamu ini apa
    perkenalkan
    introduce yourself
    apa kabar
    bagaimana kabar
