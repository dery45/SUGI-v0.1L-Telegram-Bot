# =============================================================
# TOPIK YANG DILARANG (FORBIDDEN TOPICS)
# =============================================================
# blocked_* sections define hard-block patterns.
# If ANY blocked keyword is found AND no allowed keyword is found,
# the question is blocked immediately.
# Note: blocked check runs AFTER allowed check — so
# "harga obat pestisida" still passes (allowed keyword wins).

