# =============================================================
# REFUSAL MESSAGE
# =============================================================
[refusal]
message = Maaf, pertanyaan tersebut berada di luar bidang keahlian Sugi. Sugi dirancang khusus untuk membantu hal-hal seputar pertanian, perkebunan, dan ketahanan pangan. Apakah ada pertanyaan seputar tanaman atau pertanian yang bisa Sugi bantu? 🌾