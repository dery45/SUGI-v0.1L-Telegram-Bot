# ─────────────────────────────────────────────────────────────────────────────
# rewriter_config.ini — Konfigurasi rule-based query rewriter untuk SUGI
#
# Format per section:
#   [referential_words]   kata yang merujuk ke konteks sebelumnya
#   [referential_suffixes] sufiks referensial (menempel ke kata, e.g. "nya")
#   [followup_patterns]   pola regex awal kalimat → followup implisit
#   [topic_keywords]      key=value: kata di history → label subjek
#
# Cara edit:
#   - Tambah/hapus baris bebas, satu item per baris
#   - Komentar diawali ; atau #
#   - Untuk [topic_keywords]: format  keyword = label
#     keyword = kata yang dicari di history (lowercase)
#     label   = teks yang disubstitusikan ke pertanyaan
#   - Restart main.py setelah edit agar perubahan aktif
#   - JANGAN ubah nama section (judul dalam kurung siku)
# ─────────────────────────────────────────────────────────────────────────────


# ─── Kata referensial (merujuk ke konteks sebelumnya) ────────────────────────
# Kata-kata ini kalau muncul di pertanyaan user menandakan ada subjek
# yang perlu diambil dari pertanyaan sebelumnya di history.
[referential_words]
words =
    ; Indonesia
    itu
    ini
    tersebut
    mereka
    tadi
    sebelumnya
    yang tadi
    yang itu
    yang ini
    itu tadi
    hal itu
    hal ini
    hal tersebut
    ; English
    it
    that
    this
    those
    these
    the above


# ─── Sufiks referensial ───────────────────────────────────────────────────────
# Sufiks yang menempel ke kata dan menandakan referensi implisit.
# Contoh: "merawatnya" (merawat + nya), "harganya" (harga + nya)
# Sufiks ini tidak diganti tapi dipakai sebagai sinyal konteks.
[referential_suffixes]
suffixes =
    nya
    nya?
    nya.


# ─── Pola followup implisit (regex) ──────────────────────────────────────────
# Pola regex yang cocok dengan awal pertanyaan yang merupakan followup implisit.
# Pertanyaan ini tidak mengandung referential word tapi butuh konteks history.
# Semua pola dicocokkan ke versi lowercase dari pertanyaan (re.match = dari awal).
# Tambah ^ di awal setiap pola (sudah included di bawah secara otomatis).
[followup_patterns]
patterns =
    ; Cara/penjelasan
    ^bagaimana cara
    ^bagaimana caranya
    ^bagaimana dengan
    ^lalu bagaimana
    ^terus bagaimana
    ^jelaskan lebih
    ^ceritakan lebih
    ^tolong jelaskan
    ^bisa dijelaskan
    ^apa manfaat
    ^apa fungsi
    ^apa kegunaan
    ; Pertanyaan lanjutan
    ^apakah juga
    ^apa saja
    ^apa lagi
    ^ada apa lagi
    ^selain itu
    ^selanjutnya
    ^berikutnya
    ; Numerik / waktu
    ^berapa harga
    ^berapa lama
    ^berapa kali
    ^berapa banyak
    ^kapan waktu
    ^kapan sebaiknya
    ^kapan harus
    ; Lokasi
    ^di mana
    ^dimana
    ^di daerah mana
    ; Sebab akibat
    ^kenapa juga
    ^mengapa juga
    ^apa penyebab
    ^apa akibat
    ; English followup
    ^how about
    ^what about
    ^and how
    ^why does
    ^when should
    ^where can


# ─── Topik non-tanaman ────────────────────────────────────────────────────────
# Kata kunci yang mewakili topik selain nama tanaman.
# Dipakai saat user bertanya tentang harga, cuaca, wilayah, teknik, dll.
# Format: keyword = label
#   keyword = kata yang dicari di history (lowercase, whole-word match)
#   label   = teks yang disubstitusikan ke pertanyaan
#
# Jika history mengandung keyword ini, label-nya dipakai sebagai subjek
# untuk resolusi referential/followup.
[topic_keywords]
; Harga & ekonomi
harga        = harga
price        = harga
nilai        = harga
tarif        = tarif
subsidi      = subsidi
kredit       = kredit pertanian
ekspor       = ekspor
impor        = impor

; Cuaca & iklim
cuaca        = cuaca
iklim        = iklim
hujan        = cuaca hujan
kemarau      = musim kemarau
musim        = musim tanam
el nino      = el nino
la nina      = la nina
kekeringan   = kekeringan
banjir       = banjir

; Wilayah Indonesia
jakarta      = Jakarta
jawa         = Jawa
jawa barat   = Jawa Barat
jawa tengah  = Jawa Tengah
jawa timur   = Jawa Timur
sumatra      = Sumatra
kalimantan   = Kalimantan
sulawesi     = Sulawesi
