# ─────────────────────────────────────────────────────────────────────────────
# plant_keywords.ini — Konfigurasi deteksi dan pemetaan nama tanaman SUGI
#
# Tiga section utama:
#   [plant_name_map]     Indonesian/English keyword → nama Perenual API
#   [keywords_strong]    Nama tanaman spesifik, langsung trigger plant API
#   [keywords_weak]      Kata generik, hanya trigger kalau ada strong juga
#
# Cara edit:
#   - [plant_name_map]  : format  keyword = api_name
#     keyword = kata yang dicari di pertanyaan (lowercase)
#     api_name = nama yang dikirim ke Perenual API
#     PENTING: frasa lebih panjang harus di atas yang pendek
#     (misal "kelapa sawit" sebelum "kelapa", "bawang merah" sebelum "bawang")
#   - [keywords_strong] : satu keyword per baris
#   - [keywords_weak]   : satu keyword per baris
#   - Restart main.py setelah edit
#   - Komentar diawali ; atau #
# ─────────────────────────────────────────────────────────────────────────────


# ─── Peta nama tanaman: keyword → nama Perenual API ──────────────────────────
